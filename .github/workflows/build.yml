name: Build ddns-go (include armv7)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - name: Build for linux armv7
        run: |
          # 关键：交叉编译 armv7
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -trimpath -ldflags "-s -w" -o ddns-go-linux-armv7 main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ddns-go-linux-armv7
          path: ddns-go-linux-armv7
